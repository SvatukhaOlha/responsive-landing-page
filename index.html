<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link rel="stylesheet" href="style.css">
	<title>Laptop shop</title>
</head>

<body>
	<header>
		<div class="logo-container">
			<img src="./img/logo.svg" alt="logo">
			<h4 class="logo">Three Dots</h4>
		</div>
		<nav>
			<ul class="nav-links">
				<li><a class="nav-link" href="#">Speacs</a></li>
				<li><a class="nav-link" href="#">Producs</a></li>
				<li><a class="nav-link" href="#">Contact</a></li>
			</ul>
		</nav>
		<div class="card">
			<img src="./img/cart.svg" alt="">
		</div>
	</header>
	<main>
		<section class="presentation">
			<div class="introduction">
				<div class="intro-text">
					<h1>Laptop for the future</h1>
					<p>Apple MacBook Pro is a macOS laptop with a 13.30-inch display that has a resolution of 2560x1600
						pixels. </p>
				</div>
				<div class="cta">
					<button class="cta-select">13.30-inch</button>
					<button class="cta-add">Add to Cart</button>
				</div>
			</div>
			<div class="cover">
				<img src="./img/mackbook.png" alt="mackbook">
			</div>
			</div>
		</section>
		<div class="laptop-select">
			<img src="./img/arrow-left.svg" alt="">
			<img src="./img/dot.svg" alt="">
			<img src="./img/dot-full.svg" alt="">
			<img src="./img/dot-full.svg" alt="">
			<img src="./img/arrow-right.svg" alt="">
		</div>
		<img class="big-circle" src="./img/big-eclipse.svg" alt="">
		<img class="mid-circle" src="./img/mid-eclipse.svg" alt="">
		<img class="small-circle" src="./img/small-eclipse.svg" alt="">
	</main>
</body>

</html>
